<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Flask Input Example</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='styles.css') }}"
    />
  </head>
  <body>
    <header>
      <h1>Heart Disease Prediction Tool</h1>
    </header>
    <div class="main-section" style="font-size: 30px">
      <p>{{ prediction }}</p>
      <p>At a {{ probability }}% probability</p>
      <div class="info-box">
        <h2>This patient has:</h2>
        <ul>
          {% for w in warnings %}
          <li>{{ w }}</li>
          {% endfor %}
        </ul>
      </div>
      <button onclick="window.location.href = '/'">
        Test for another patient
      </button>
    </div>
  </body>
</html>
